cluster:
  allowSchedulingOnControlPlanes: true
machine:
  nodeLabels:
    node-role.kubernetes.io/storage: "true"
  install:
    disk: /dev/vda
    wipe: true
  network:
    disableSearchDomain: true
    interfaces:
      - interface: enp0s1
        dhcp: false
        addresses:
          - 192.168.0.54/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.0.1
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
    extraHostEntries:
      - ip: 192.168.0.54
        aliases:
          - my-cluster-master
  time:
    servers:
      - time.cloudflare.com
      - pool.ntp.org
  sysctls:
    fs.inotify.max_user_instances: "8192"
    fs.inotify.max_user_watches: "1048576"
    net.ipv4.conf.all.rp_filter: "1"
    net.ipv4.tcp_syncookies: "1"
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.0.0/24
    extraConfig:
      containerLogMaxSize: "10Mi"
      containerLogMaxFiles: 3
      kubeReserved:
        cpu: "100m"
        memory: "256Mi"
      systemReserved:
        cpu: "100m"
        memory: "256Mi"
      evictionHard:
        memory.available: "100Mi"
        nodefs.available: "10%"
        imagefs.available: "15%"