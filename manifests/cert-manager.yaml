apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # deploy first, CRDs must exist before issuers
spec:
  project: default
  source:
    chart: cert-manager
    repoURL: https://charts.jetstack.io
    targetRevision: v1.16.3             # latest stable as of 2026-04
    helm:
      values: |
        crds:
          enabled: true                 # new recommended key (replaces installCRDs)
        global:
          leaderElection:
            namespace: cert-manager
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        webhook:
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 64Mi
        cainjector:
          resources:
            requests:
              cpu: 5m
              memory: 48Mi
            limits:
              memory: 96Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# Self-signed bootstrap issuer (wave 1 – after cert-manager CRDs are ready)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: iooding-root-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  isCA: true
  commonName: iooding-internal-ca
  secretName: iooding-root-ca-secret
  duration: 87600h   # 10 years
  renewBefore: 720h  # renew 30 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA issuer referenced by iooding ingress annotation
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: iooding-ca-issuer
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  ca:
    secretName: iooding-root-ca-secret
