apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-path-storage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"  # storage must be ready before stateful apps
spec:
  project: default
  source:
    repoURL: https://github.com/rancher/local-path-provisioner.git
    targetRevision: v0.0.30            # pinned to last well-tested release
    path: deploy/chart/local-path-provisioner
    helm:
      values: |
        storageClass:
          name: standard
          defaultClass: true
          reclaimPolicy: Retain
          provisionerName: rancher.io/local-path
        nodePathMap:
          - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
            paths:
              - /var/local-path-provisioner
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: local-path-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# Alias StorageClass so any chart referencing "longhorn" still works
# without actually running Longhorn (saves ~500–800 MiB RAM).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
